apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions
  namespace: parlor
---
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-token
  namespace: parlor
  annotations:
    kubernetes.io/service-account.name: github-actions
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-restarter
  namespace: parlor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployment-restarter
  namespace: parlor
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: parlor
roleRef:
  kind: Role
  name: deployment-restarter
  apiGroup: rbac.authorization.k8s.io
